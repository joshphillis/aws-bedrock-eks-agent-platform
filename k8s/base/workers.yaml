# ── Research Agent ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-agent
  namespace: agents
  labels:
    app: research-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: research-agent
  template:
    metadata:
      labels:
        app: research-agent
    spec:
      serviceAccountName: sa-research-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      tolerations:
        - key: workload
          operator: Equal
          value: ai-agents
          effect: NoSchedule
      containers:
        - name: research-agent
          image: 851725205521.dkr.ecr.us-east-1.amazonaws.com/aiplatform-research-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: agent-secrets-research
                  key: aws-region
            - name: BEDROCK_MODEL_ID
              valueFrom:
                secretKeyRef:
                  name: agent-secrets-research
                  key: bedrock-model-id
            - name: SQS_RESEARCH_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets-research
                  key: sqs-research-queue-url
            - name: SQS_RESULTS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets-research
                  key: sqs-results-queue-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets-research
                  key: openai-api-key
                  optional: true
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: spc-research-agent
        - name: tmp
          emptyDir: {}
---
