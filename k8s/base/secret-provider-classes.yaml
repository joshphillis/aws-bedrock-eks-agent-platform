# AWS Secrets and Configuration Provider (ASCP) SecretProviderClasses
# Each agent uses its IRSA role to pull the shared Secrets Manager secret and
# sync it into a Kubernetes Secret named "agent-secrets" in the agents namespace.
#
# Prerequisites:
#   helm install secrets-store-csi-driver secrets-store-csi-driver/secrets-store-csi-driver
#   helm install aws-secrets-manager-and-config-provider aws-secrets-manager/secrets-store-csi-driver-provider-aws
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: spc-orchestrator
  namespace: agents
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "aiplatform/dev/config"
        objectType: "secretsmanager"
        jmesPath:
          - path: aws_region
            objectAlias: aws-region
          - path: bedrock_model_id
            objectAlias: bedrock-model-id
          - path: sqs_research_queue_url
            objectAlias: sqs-research-queue-url
          - path: sqs_analysis_queue_url
            objectAlias: sqs-analysis-queue-url
          - path: sqs_writer_queue_url
            objectAlias: sqs-writer-queue-url
          - path: sqs_results_queue_url
            objectAlias: sqs-results-queue-url
      - objectName: "aiplatform/dev/openai"
        objectType: "secretsmanager"
        jmesPath:
          - path: api_key
            objectAlias: openai-api-key
  secretObjects:
    - secretName: agent-secrets-orchestrator
      type: Opaque
      data:
        - objectName: aws-region
          key: aws-region
        - objectName: bedrock-model-id
          key: bedrock-model-id
        - objectName: sqs-research-queue-url
          key: sqs-research-queue-url
        - objectName: sqs-analysis-queue-url
          key: sqs-analysis-queue-url
        - objectName: sqs-writer-queue-url
          key: sqs-writer-queue-url
        - objectName: sqs-results-queue-url
          key: sqs-results-queue-url
        - objectName: openai-api-key
          key: openai-api-key
