name: Agents

on:
  push:
    branches: [main]
    paths: ["agents/**"]
  pull_request:
    branches: [main]
    paths: ["agents/**"]

env:
  AWS_REGION:   "us-east-1"
  ECR_PREFIX:   "aiplatform"

permissions:
  id-token:  write
  contents:  write   # for kustomize image tag commit
  packages:  write

jobs:
  # ── 1. Detect which agents changed ───────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      orchestrator:   ${{ steps.filter.outputs.orchestrator }}
      research-agent: ${{ steps.filter.outputs.research-agent }}
      analysis-agent: ${{ steps.filter.outputs.analysis-agent }}
      writer-agent:   ${{ steps.filter.outputs.writer-agent }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            orchestrator:
              - 'agents/orchestrator/**'
            research-agent:
              - 'agents/research-agent/**'
            analysis-agent:
              - 'agents/analysis-agent/**'
            writer-agent:
              - 'agents/writer-agent/**'

  # ── 2. Build, Scan, Push ──────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.agent }}
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        agent:
          - orchestrator
          - research-agent
          - analysis-agent
          - writer-agent
        include:
          - agent: orchestrator
            changed: ${{ needs.detect-changes.outputs.orchestrator }}
          - agent: research-agent
            changed: ${{ needs.detect-changes.outputs.research-agent }}
          - agent: analysis-agent
            changed: ${{ needs.detect-changes.outputs.analysis-agent }}
          - agent: writer-agent
            changed: ${{ needs.detect-changes.outputs.writer-agent }}
    if: |
      matrix.changed == 'true' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_851725205521 }}:role/github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 8)
          REPO="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_PREFIX }}-${{ matrix.agent }}"
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image=${REPO}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "repo=${REPO}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: agents/${{ matrix.agent }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha,scope=${{ matrix.agent }}
          cache-to:   type=gha,scope=${{ matrix.agent }},mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    ${{ steps.meta.outputs.image }}
          format:       table
          exit-code:    "1"
          severity:     CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push image (merge only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: agents/${{ matrix.agent }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.repo }}:latest
          cache-from: type=gha,scope=${{ matrix.agent }}
          cache-to:   type=gha,scope=${{ matrix.agent }},mode=max

  # ── 3. Update Kustomize image tags ───────────────────────────────────────────
  update-manifests:
    name: Update Manifests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_851725205521 }}:role/github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags
        working-directory: k8s/overlays/dev
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 8)
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          for agent in orchestrator research-agent analysis-agent writer-agent; do
            kustomize edit set image \
              "${REGISTRY}/${{ env.ECR_PREFIX }}-${agent}=${REGISTRY}/${{ env.ECR_PREFIX }}-${agent}:${SHORT_SHA}"
          done

      - name: Commit updated kustomization
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git diff --cached --quiet || git commit -m "chore: update image tags to ${{ github.sha }}"
          git push

  # ── 4. Verify Flux Rollout ────────────────────────────────────────────────────
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: update-manifests
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_851725205521 }}:role/github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name eks-aiplatform-dev --region ${{ env.AWS_REGION }}

      - name: Wait for Flux reconciliation
        run: |
          kubectl -n flux-system wait kustomization/agents-dev \
            --for=condition=Ready \
            --timeout=300s

      - name: Verify pod rollouts
        run: |
          kubectl -n agents rollout status deployment/orchestrator   --timeout=120s
          kubectl -n agents rollout status deployment/research-agent --timeout=120s
          kubectl -n agents rollout status deployment/analysis-agent --timeout=120s
          kubectl -n agents rollout status deployment/writer-agent   --timeout=120s

      - name: Smoke-test orchestrator health endpoint
        run: |
          kubectl -n agents port-forward svc/orchestrator 8080:80 &
          sleep 3
          curl -sf http://localhost:8080/health | jq .
          kill %1
