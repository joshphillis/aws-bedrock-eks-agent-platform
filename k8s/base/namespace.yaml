apiVersion: v1
kind: Namespace
metadata:
  name: agents
  labels:
    name: agents
---
# ServiceAccounts annotated with IRSA role ARNs.
# The eks.amazonaws.com/role-arn annotation is patched per-environment in overlays.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-orchestrator
  namespace: agents
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/role-orchestrator-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-research-agent
  namespace: agents
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/role-research-agent-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-analysis-agent
  namespace: agents
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/role-analysis-agent-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-writer-agent
  namespace: agents
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/role-writer-agent-dev
