apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: aws-bedrock-eks-agent-platform
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://github.com/<your-github-org>/aws-bedrock-eks-agent-platform
  ref:
    branch: main
  secretRef:
    name: flux-github-token
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agents-dev
  namespace: flux-system
spec:
  interval: 2m0s
  path: ./k8s/overlays/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: aws-bedrock-eks-agent-platform
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: orchestrator
      namespace: agents
    - apiVersion: apps/v1
      kind: Deployment
      name: research-agent
      namespace: agents
    - apiVersion: apps/v1
      kind: Deployment
      name: analysis-agent
      namespace: agents
    - apiVersion: apps/v1
      kind: Deployment
      name: writer-agent
      namespace: agents
