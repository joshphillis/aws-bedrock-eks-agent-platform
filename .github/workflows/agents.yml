name: Agents

on:
  push:
    branches: [main]
    paths: ["agents/**"]
  pull_request:
    branches: [main]
    paths: ["agents/**"]

env:
  AWS_REGION: "us-east-1"
  ECR_PREFIX:  "aiplatform"

permissions:
  id-token: write
  contents: write   # for kustomize image tag commit

jobs:
  # ── 1. Detect which agents changed ───────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      orchestrator:   ${{ steps.filter.outputs.orchestrator }}
      research-agent: ${{ steps.filter.outputs.research-agent }}
      analysis-agent: ${{ steps.filter.outputs.analysis-agent }}
      writer-agent:   ${{ steps.filter.outputs.writer-agent }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            orchestrator:
              - 'agents/orchestrator/**'
            research-agent:
              - 'agents/research-agent/**'
            analysis-agent:
              - 'agents/analysis-agent/**'
            writer-agent:
              - 'agents/writer-agent/**'

  # ── 2. Trigger CodeBuild (one job per agent) ──────────────────────────────────
  build:
    name: Build ${{ matrix.agent }}
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        agent:
          - orchestrator
          - research-agent
          - analysis-agent
          - writer-agent
        include:
          - agent: orchestrator
            changed: ${{ needs.detect-changes.outputs.orchestrator }}
          - agent: research-agent
            changed: ${{ needs.detect-changes.outputs.research-agent }}
          - agent: analysis-agent
            changed: ${{ needs.detect-changes.outputs.analysis-agent }}
          - agent: writer-agent
            changed: ${{ needs.detect-changes.outputs.writer-agent }}
    if: |
      matrix.changed == 'true' ||
      github.event_name == 'push'

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_851725205521 }}:role/github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Start CodeBuild
        id: start
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name "${{ env.ECR_PREFIX }}-${{ matrix.agent }}-dev" \
            --source-version "${{ github.sha }}" \
            --query 'build.id' \
            --output text)
          echo "build_id=${BUILD_ID}" >> "$GITHUB_OUTPUT"
          echo "Started build ${BUILD_ID}"

      - name: Wait for build to complete
        run: |
          BUILD_ID="${{ steps.start.outputs.build_id }}"
          echo "Polling ${BUILD_ID}..."
          while true; do
            STATUS=$(aws codebuild batch-get-builds \
              --ids "${BUILD_ID}" \
              --query 'builds[0].buildStatus' \
              --output text)
            echo "  status: ${STATUS}"
            case "${STATUS}" in
              SUCCEEDED)
                echo "Build succeeded."
                exit 0
                ;;
              FAILED|FAULT|STOPPED|TIMED_OUT)
                echo "Build failed with status: ${STATUS}"
                exit 1
                ;;
              *)
                sleep 30
                ;;
            esac
          done

  # ── 3. Update Kustomize image tags ───────────────────────────────────────────
  update-manifests:
    name: Update Manifests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_851725205521 }}:role/github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags
        # CodeBuild tags images with the full commit SHA ($CODEBUILD_RESOLVED_SOURCE_VERSION)
        working-directory: k8s/overlays/dev
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          for agent in orchestrator research-agent analysis-agent writer-agent; do
            kustomize edit set image \
              "${REGISTRY}/${{ env.ECR_PREFIX }}-${agent}=${REGISTRY}/${{ env.ECR_PREFIX }}-${agent}:${{ github.sha }}"
          done

      - name: Commit updated kustomization
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git diff --cached --quiet || git commit -m "chore: update image tags to ${{ github.sha }}"
          git push

  # ── 4. Verify Flux Rollout ────────────────────────────────────────────────────
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: update-manifests
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_851725205521 }}:role/github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name eks-aiplatform-dev --region ${{ env.AWS_REGION }}

      - name: Wait for Flux reconciliation
        run: |
          kubectl -n flux-system wait kustomization/agents-dev \
            --for=condition=Ready \
            --timeout=300s

      - name: Verify pod rollouts
        run: |
          kubectl -n agents rollout status deployment/orchestrator   --timeout=120s
          kubectl -n agents rollout status deployment/research-agent --timeout=120s
          kubectl -n agents rollout status deployment/analysis-agent --timeout=120s
          kubectl -n agents rollout status deployment/writer-agent   --timeout=120s

      - name: Smoke-test orchestrator health endpoint
        run: |
          kubectl -n agents port-forward svc/orchestrator 8080:80 &
          sleep 3
          curl -sf http://localhost:8080/health | jq .
          kill %1
